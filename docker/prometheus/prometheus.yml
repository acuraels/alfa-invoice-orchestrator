global:
  scrape_interval: 5s

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: rabbitmq_exporter
    static_configs:
      - targets: ["rabbitmq_exporter:9419"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
